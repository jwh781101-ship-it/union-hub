<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NC노조 시스템 허브</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg: #f5f5f7;
  --sidebar-bg: #3a3a3e;
  --surface: #ffffff;
  --surface-hover: rgba(0,0,0,0.04);
  --surface-active: rgba(0,122,255,0.09);
  --border: rgba(0,0,0,0.08);
  --accent: #007aff;
  --accent-light: rgba(0,122,255,0.12);
  --text-primary: #1d1d1f;
  --text-secondary: #6e6e73;
  --text-muted: #aeaeb2;
  --sidebar-w: 260px;
  --sidebar-peek: 44px;
  --header-h: 48px;
  --tr: 0.3s cubic-bezier(0.4,0,0.2,1);
  --radius: 10px;
  --shadow: 0 2px 16px rgba(0,0,0,0.07);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.13);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }

body {
  font-family:'Noto Sans KR',sans-serif;
  background:var(--bg);
  color:var(--text-primary);
  height:100vh;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

/* ── TITLEBAR ── */
.titlebar {
  height:var(--header-h);
  background:#1c1c1e;
  border-bottom:1px solid rgba(255,255,255,0.08);
  display:flex;
  align-items:center;
  padding:0 20px;
  flex-shrink:0;
  z-index:20;
  position:relative;
}
.traffic-lights { display:flex; gap:7px; flex-shrink:0; }
.tl { width:12px; height:12px; border-radius:50%; cursor:default; }
.tl-red    { background:#ff5f57; }
.tl-yellow { background:#febc2e; }
.tl-green  { background:#28c840; }

.titlebar-title {
  position:absolute; left:50%; transform:translateX(-50%);
  font-size:13px; font-weight:500; color:rgba(255,255,255,0.85);
  display:flex; align-items:center; gap:7px;
  pointer-events:none;
}

.breadcrumb {
  margin-left:auto;
  display:flex; align-items:center; gap:5px;
  font-size:12px; color:rgba(255,255,255,0.4);
}
.bc-sep { font-size:10px; }
.bc-cur { color:#5eb0ff; font-weight:500; }

/* ── LAYOUT ── */
.layout { display:flex; flex:1; overflow:hidden; position:relative; }

/* ── SIDEBAR — overlay 방식 ── */
.sidebar {
  width:var(--sidebar-w);
  background:var(--sidebar-bg);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-right:1px solid rgba(255,255,255,0.08);
  display:flex; flex-direction:column; flex-shrink:0;
  transform:translateX(calc(var(--sidebar-peek) - var(--sidebar-w)));
  transition:transform var(--tr);
  position:absolute; left:0; top:0; bottom:0;
  z-index:15; overflow:hidden;
}
.sidebar:hover {
  transform:translateX(0);
  box-shadow:var(--shadow-lg);
}

.peek-strip {
  position:absolute; right:0; top:0; bottom:0;
  width:var(--sidebar-peek);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:22px;
  pointer-events:none;
  opacity:1; transition:opacity 0.2s;
}
.sidebar:hover .peek-strip { opacity:0; }
.peek-icon { font-size:17px; opacity:0.3; }

.sidebar-header {
  padding:14px 16px 8px;
  flex-shrink:0;
}
.sidebar-app-name {
  font-size:11px; font-weight:600;
  color:rgba(255,255,255,0.25); letter-spacing:0.5px; text-transform:uppercase;
}

/* ── TREE ── */
.tree {
  flex:1; overflow-y:auto; overflow-x:hidden;
  padding:4px 0 12px;
  scrollbar-width:none;
}
.tree::-webkit-scrollbar { display:none; }

.tree-section { margin-bottom:1px; }

.tree-group-label {
  display:flex; align-items:center; gap:9px;
  padding:7px 10px;
  margin:0 6px;
  border-radius:8px;
  cursor:pointer; user-select:none;
  transition:background 0.15s;
}
.tree-group-label:hover { background:rgba(255,255,255,0.07); }
.tree-group-label.active { background:rgba(0,122,255,0.18); }
.tree-group-label.active .group-name { color:#5eb0ff; font-weight:600; }

.tree-caret {
  width:13px; height:13px; flex-shrink:0;
  color:rgba(255,255,255,0.25); transition:transform 0.2s;
  cursor:pointer;
}
.tree-section.open .tree-caret { transform:rotate(90deg); }

.group-icon { font-size:15px; width:20px; text-align:center; flex-shrink:0; }
.group-name {
  font-size:13px; font-weight:500; color:rgba(255,255,255,0.85);
  flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.url-dot {
  width:6px; height:6px; border-radius:50%;
  background:var(--accent); flex-shrink:0;
  transition:opacity 0.2s;
}

.tree-children {
  overflow:hidden; max-height:0;
  transition:max-height 0.28s cubic-bezier(0.4,0,0.2,1);
}
.tree-section.open .tree-children { max-height:300px; }

.tree-item {
  display:flex; align-items:center; gap:8px;
  padding:5px 10px 5px 42px;
  margin:0 6px;
  border-radius:6px;
  cursor:pointer; user-select:none;
  transition:background 0.12s;
}
.tree-item:hover { background:rgba(255,255,255,0.06); }
.tree-item.active { background:rgba(0,122,255,0.15); }
.tree-item.active .item-name { color:#5eb0ff; }
.item-icon { font-size:12px; flex-shrink:0; opacity:0.65; }
.item-name {
  font-size:12px; color:rgba(255,255,255,0.45);
  flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}

.sidebar-footer {
  border-top:1px solid rgba(255,255,255,0.08);
  padding:11px 14px;
  display:flex; align-items:center; gap:10px; flex-shrink:0;
}
.avatar {
  width:26px; height:26px; border-radius:50%;
  background:linear-gradient(135deg,#007aff,#5ac8fa);
  display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:600; color:#fff; flex-shrink:0;
}
.footer-name { font-size:12px; font-weight:500; color:rgba(255,255,255,0.8); }
.footer-role { font-size:11px; color:rgba(255,255,255,0.35); }

/* ── MAIN — 항상 peek(44px) 기준으로 고정, 사이드바는 위에 overlay ── */
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; margin-left:var(--sidebar-peek); }

/* 환영 화면 */
.welcome {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:24px; padding:48px;
}
.welcome-emoji { font-size:52px; }
.welcome-title { font-size:26px; font-weight:600; letter-spacing:-0.5px; }
.welcome-sub { font-size:14px; color:var(--text-secondary); line-height:1.7; text-align:center; }
.welcome-hint {
  font-size:12px; color:var(--text-muted);
  display:flex; align-items:center; gap:8px;
}
.hint-arrow { animation:nudge 2s ease-in-out infinite; display:inline-block; }
@keyframes nudge { 0%,100%{transform:translateX(0)} 50%{transform:translateX(-5px)} }

.quick-grid {
  display:grid; grid-template-columns:repeat(5,1fr);
  gap:10px; max-width:700px; width:100%;
}
.quick-card {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:18px 12px 14px;
  cursor:pointer; text-align:center;
  transition:all 0.2s;
  box-shadow:var(--shadow);
}
.quick-card:hover {
  transform:translateY(-3px);
  box-shadow:var(--shadow-lg);
  border-color:rgba(0,122,255,0.25);
}
.qc-icon  { font-size:26px; margin-bottom:9px; }
.qc-name  { font-size:12px; font-weight:500; color:var(--text-primary); line-height:1.4; }
.qc-count { font-size:11px; color:var(--text-muted); margin-top:3px; }

/* ── FRAME VIEW ── */
.frame-view { display:none; flex-direction:column; flex:1; overflow:hidden; }
.frame-view.visible { display:flex; }

.frame-toolbar {
  height:42px;
  background:#2c2c2e;
  border-bottom:1px solid rgba(255,255,255,0.08);
  display:flex; align-items:center;
  padding:0 14px; gap:8px; flex-shrink:0;
}
.tb-title {
  font-size:13px; font-weight:500; color:rgba(255,255,255,0.85);
  display:flex; align-items:center; gap:7px;
}
.tb-icon { font-size:14px; }
.tb-sep { flex:1; }
.tb-url {
  font-family:'JetBrains Mono',monospace;
  font-size:11px; color:rgba(255,255,255,0.3);
  max-width:280px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.tb-btn {
  padding:5px 11px; border-radius:6px;
  border:1px solid rgba(255,255,255,0.12); background:rgba(255,255,255,0.07);
  font-size:12px; color:rgba(255,255,255,0.55);
  cursor:pointer; font-family:'Noto Sans KR',sans-serif;
  transition:all 0.15s; white-space:nowrap;
}
.tb-btn:hover { background:rgba(255,255,255,0.13); color:rgba(255,255,255,0.9); }
.tb-btn.close:hover { background:rgba(255,59,48,0.2); color:#ff6b6b; border-color:rgba(255,59,48,0.3); }

.frame-body { flex:1; position:relative; overflow:hidden; background:#fff; }
.frame-body iframe { width:100%; height:100%; border:none; display:block; }

/* ── PLACEHOLDER ── */
.placeholder {
  position:absolute; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:14px; background:var(--bg); padding:48px; text-align:center;
}
.ph-emoji { font-size:48px; opacity:0.2; }
.ph-title { font-size:16px; font-weight:600; color:var(--text-primary); }
.ph-sub   { font-size:13px; color:var(--text-secondary); line-height:1.7; }
.ph-chips {
  display:flex; flex-wrap:wrap; gap:7px;
  justify-content:center; max-width:420px; margin:2px 0 6px;
}
.ph-chip {
  font-size:12px; background:var(--surface);
  border:1px solid var(--border); border-radius:20px;
  padding:4px 13px; color:var(--text-secondary);
  box-shadow:var(--shadow);
}
.url-row { display:flex; gap:8px; width:100%; max-width:460px; }
.url-input {
  flex:1; padding:9px 13px; border-radius:8px;
  border:1px solid var(--border); background:var(--surface);
  font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text-primary);
  outline:none; box-shadow:var(--shadow);
  transition:border-color 0.2s, box-shadow 0.2s;
}
.url-input:focus {
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(0,122,255,0.13);
}
.url-input::placeholder { color:var(--text-muted); }
.url-submit {
  padding:9px 18px; border-radius:8px; border:none;
  background:var(--accent); color:#fff;
  font-size:13px; font-weight:500; cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;
  box-shadow:0 2px 8px rgba(0,122,255,0.28);
  transition:all 0.15s; white-space:nowrap;
}
.url-submit:hover { background:#0066dd; }
</style>
</head>
<body>

<div class="titlebar">
  <div class="traffic-lights">
    <div class="tl tl-red"></div>
    <div class="tl tl-yellow"></div>
    <div class="tl tl-green"></div>
  </div>
  <div class="titlebar-title">🏢 NC노동조합 시스템 허브</div>
  <div class="breadcrumb" id="breadcrumb">
    <span>허브</span>
  </div>
</div>

<div class="layout">

  <aside class="sidebar">
    <div class="peek-strip" aria-hidden="true">
      <span class="peek-icon">👥</span>
      <span class="peek-icon">📊</span>
      <span class="peek-icon">📣</span>
      <span class="peek-icon">📱</span>
      <span class="peek-icon">💰</span>
      <span class="peek-icon">🎁</span>
      <span class="peek-icon">🎲</span>
    </div>
    <div class="sidebar-header">
      <div class="sidebar-app-name">Systems</div>
    </div>
    <nav class="tree" id="tree"></nav>
    <div class="sidebar-footer">
      <div class="avatar">정</div>
      <div>
        <div class="footer-name">정원희</div>
        <div class="footer-role">정책국장</div>
      </div>
    </div>
  </aside>

  <main class="main">

    <div class="welcome" id="welcome">
      <div class="welcome-emoji">🏢</div>
      <div>
        <div class="welcome-title">노조 시스템 허브</div>
        <p class="welcome-sub">왼쪽 사이드바에서 시스템을 선택하세요</p>
      </div>
      <div class="welcome-hint">
        <span class="hint-arrow">←</span>
        <span>사이드바에 마우스를 가져가면 메뉴가 열립니다</span>
      </div>
      <div class="quick-grid" id="quickGrid"></div>
    </div>

    <div class="frame-view" id="frameView">
      <div class="frame-toolbar">
        <div class="tb-title">
          <span class="tb-icon" id="tbIcon"></span>
          <span id="tbTitle"></span>
        </div>
        <div class="tb-sep"></div>
        <span class="tb-url" id="tbUrl"></span>
        <button class="tb-btn" id="btnNewTab">새 탭 ↗</button>
        <button class="tb-btn" id="btnReload">↺</button>
        <button class="tb-btn close" id="btnClose">✕</button>
      </div>
      <div class="frame-body" id="frameBody"></div>
    </div>

  </main>
</div>

<script>
const SYSTEMS = [
  {
    id: 'members', url: 'https://script.google.com/macros/s/AKfycbxADZMqSdrmSFQTfoyhrJDjHDPa0EBI_PIJOEQWRCdFr2KuMPOIuyv9yDWemMLiAIComw/exec', icon: '👥', group: '조합원 관리',
    items: [
      { icon: '📒', name: '조합원 명단' },
      { icon: '💳', name: '조합비 납부 대상' },
    ]
  },
  {
    id: 'dues', url: 'https://script.google.com/macros/s/AKfycbw9grufTk2mw4EfiGFG8ls2AO0vCFZdqwmcbLoD2_6nRnj8g2Jnb2GVWbQhmGUU0nlT/exec', icon: '📊', group: '조합비 납부 현황',
    items: [
      { icon: '📋', name: '조합비 납부 관리' },
    ]
  },
  {
    id: 'alimtalk', url: 'https://script.google.com/macros/s/AKfycbytfXL_druAE9uOuhgCIUixJaXDXEnKwM20Lcwb6KaXYn_XeGe-HL32LL1MvzbzR-LV/exec', icon: '📣', group: '알림톡 전송',
    items: [
      { icon: '✍️', name: '신규가입' },
      { icon: '🚪', name: '탈퇴처리' },
      { icon: '🌸', name: '경조사' },
      { icon: '⚖️', name: '법률상담' },
    ]
  },
  {
    id: 'sms', url: 'https://script.google.com/macros/s/AKfycbwyEx5noIfhLSMk3yAXwJWEVQ_zA1LvQpgeemVEyT7vU5r_wA9h5hIuAJso3i1Offp-/exec', icon: '📱', group: '문자 알림톡 발송',
    items: [
      { icon: '💬', name: 'SMS' },
      { icon: '📤', name: '알림톡' },
    ]
  },
  {
    id: 'expense', url: 'https://script.google.com/macros/s/AKfycbw7YgXLRQAiECakoXnyRS6A0kCK_wP3xkYQCsGYyBpLI218fzsThTRLzN5vFN6IM6bQ/exec', icon: '💰', group: '조합비 지출',
    items: [
      { icon: '📥', name: '조합비 수입/비용내역' },
      { icon: '🔗', name: '출금/카드내역 매칭' },
      { icon: '📈', name: '리포트' },
      { icon: '🔍', name: '회계공시' },
    ]
  },
  {
    id: 'welfare', url: 'https://script.google.com/macros/s/AKfycbwZPSPyz_AwV6aEsI-ZREKn6hO2RM7g0ylcF1gpZtOJUJlWBEZeiPuCX1ZwgQyp47dj/exec', icon: '🎁', group: '복지몰 관리',
    items: [
      { icon: '📊', name: '현황판' },
      { icon: '👥', name: '임직원 일괄등록' },
      { icon: '🎯', name: '포인트 배정' },
    ]
  },
      { icon: '💾', name: '저장된 문서' },
      { icon: '📄', name: 'PDF 생성' },
    ]
  },
  {
    id: 'raffle', url: 'https://script.google.com/macros/s/AKfycby81zoMDJ3kTP5XbQ_xh2ubRyhDqDJ86jb7llJqMJjDNs1U93kN5ToULHpwCm_GXxtf/exec', icon: '🎲', group: '이벤트 추첨',
    items: [
      { icon: '🔍', name: '과거 행사 참여자 조회' },
      { icon: '🎯', name: '추첨 실행' },
      { icon: '📜', name: '추첨 히스토리' },
    ]
  },
];

const STORE = 'ncHubUrls_v3';
const urls  = JSON.parse(localStorage.getItem(STORE) || '{}');
const HARDCODED = {"members": "https://script.google.com/macros/s/AKfycbxADZMqSdrmSFQTfoyhrJDjHDPa0EBI_PIJOEQWRCdFr2KuMPOIuyv9yDWemMLiAIComw/exec", "dues": "https://script.google.com/macros/s/AKfycbw9grufTk2mw4EfiGFG8ls2AO0vCFZdqwmcbLoD2_6nRnj8g2Jnb2GVWbQhmGUU0nlT/exec", "alimtalk": "https://script.google.com/macros/s/AKfycbytfXL_druAE9uOuhgCIUixJaXDXEnKwM20Lcwb6KaXYn_XeGe-HL32LL1MvzbzR-LV/exec", "sms": "https://script.google.com/macros/s/AKfycbwyEx5noIfhLSMk3yAXwJWEVQ_zA1LvQpgeemVEyT7vU5r_wA9h5hIuAJso3i1Offp-/exec", "expense": "https://script.google.com/macros/s/AKfycbw7YgXLRQAiECakoXnyRS6A0kCK_wP3xkYQCsGYyBpLI218fzsThTRLzN5vFN6IM6bQ/exec", "raffle": "https://script.google.com/macros/s/AKfycby81zoMDJ3kTP5XbQ_xh2ubRyhDqDJ86jb7llJqMJjDNs1U93kN5ToULHpwCm_GXxtf/exec", "welfare": "https://script.google.com/macros/s/AKfycbwZPSPyz_AwV6aEsI-ZREKn6hO2RM7g0ylcF1gpZtOJUJlWBEZeiPuCX1ZwgQyp47dj/exec"};
const getUrl  = id  => HARDCODED[id] || urls[id] || '';
const saveUrl = (id, u) => { urls[id]=u; localStorage.setItem(STORE, JSON.stringify(urls)); };

let activeGroupId = null;

// ── SIDEBAR BUILD ──────────────────────────────────────────────────────────
const treeEl    = document.getElementById('tree');
const quickGrid = document.getElementById('quickGrid');

SYSTEMS.forEach(grp => {
  // tree section
  const sec = document.createElement('div');
  sec.className = 'tree-section open';
  sec.dataset.id = grp.id;

  const label = document.createElement('div');
  label.className = 'tree-group-label';
  label.dataset.group = grp.id;
  label.innerHTML = `
    <svg class="tree-caret" viewBox="0 0 16 16" fill="currentColor">
      <path d="M6.22 3.22a.75.75 0 011.06 0l4.25 4.25a.75.75 0 010 1.06l-4.25 4.25a.75.75 0 01-1.06-1.06L9.94 8 6.22 4.28a.75.75 0 010-1.06z"/>
    </svg>
    <span class="group-icon">${grp.icon}</span>
    <span class="group-name">${grp.group}</span>
    <span class="url-dot" style="opacity:${getUrl(grp.id)?'0.75':'0'}"></span>
  `;

  // caret → 접기/펼치기
  label.querySelector('.tree-caret').addEventListener('click', e => {
    e.stopPropagation();
    sec.classList.toggle('open');
  });
  // 그 외 → 앱 오픈
  label.addEventListener('click', e => {
    if (e.target.closest('.tree-caret')) return;
    openGroup(grp);
  });

  const kids = document.createElement('div');
  kids.className = 'tree-children';
  grp.items.forEach(item => {
    const el = document.createElement('div');
    el.className = 'tree-item';
    el.dataset.key = `${grp.id}__${item.name}`;
    el.innerHTML = `<span class="item-icon">${item.icon}</span><span class="item-name">${item.name}</span>`;
    // 하위항목 클릭 → 같은 그룹 URL 오픈 (해당 항목 하이라이트)
    el.addEventListener('click', () => openGroup(grp, item));
    kids.appendChild(el);
  });

  sec.appendChild(label);
  sec.appendChild(kids);
  treeEl.appendChild(sec);

  // quick card
  const card = document.createElement('div');
  card.className = 'quick-card';
  card.innerHTML = `
    <div class="qc-icon">${grp.icon}</div>
    <div class="qc-name">${grp.group}</div>
    <div class="qc-count">${grp.items.length}개 메뉴</div>
  `;
  card.addEventListener('click', () => openGroup(grp));
  quickGrid.appendChild(card);
});

// ── OPEN GROUP ─────────────────────────────────────────────────────────────
function openGroup(grp, activeItem = null) {
  activeGroupId = grp.id;

  // 트리 활성화
  document.querySelectorAll('.tree-group-label').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tree-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`.tree-group-label[data-group="${grp.id}"]`).classList.add('active');
  if (activeItem) {
    const el = document.querySelector(`.tree-item[data-key="${grp.id}__${activeItem.name}"]`);
    if (el) el.classList.add('active');
  }

  // breadcrumb
  const bc = document.getElementById('breadcrumb');
  let bcHtml = `<span>허브</span><span class="bc-sep">›</span><span class="bc-cur">${grp.group}</span>`;
  if (activeItem) bcHtml += `<span class="bc-sep">›</span><span style="color:var(--text-secondary);font-size:12px">${activeItem.name}</span>`;
  bc.innerHTML = bcHtml;

  // 화면 전환
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('frameView').classList.add('visible');

  document.getElementById('tbIcon').textContent  = grp.icon;
  document.getElementById('tbTitle').textContent = activeItem
    ? `${grp.group}  ›  ${activeItem.name}`
    : grp.group;

  const url = getUrl(grp.id);
  url ? renderFrame(url, grp.id) : renderPlaceholder(grp);

  // 버튼 바인딩
  document.getElementById('btnNewTab').onclick = () => {
    const u = getUrl(activeGroupId); if (u) window.open(u, '_blank');
  };
  document.getElementById('btnReload').onclick = () => {
    const u = getUrl(activeGroupId);
    if (u) { const f = iframeCache[activeGroupId]; if(f){f.src='';setTimeout(()=>f.src=u,50);} }
  };
  document.getElementById('btnClose').onclick = closeView;
}

// ── iframe 캐시 — 한번 로딩한 iframe은 숨겨두고 재사용 ──────────────
const iframeCache = {}; // { groupId: iframeElement }

function renderFrame(url, groupId) {
  document.getElementById('tbUrl').textContent = url;
  const body = document.getElementById('frameBody');

  // 모든 캐시된 iframe 숨기기
  Object.values(iframeCache).forEach(f => f.style.display = 'none');
  // placeholder 제거
  const ph = body.querySelector('.placeholder');
  if (ph) ph.remove();

  if (iframeCache[groupId]) {
    // 이미 로딩된 iframe → 그냥 보여주기 (재로딩 없음)
    iframeCache[groupId].style.display = 'block';
  } else {
    // 처음 로딩 → iframe 생성 후 캐시
    const iframe = document.createElement('iframe');
    iframe.src = url;
    iframe.allowFullscreen = true;
    iframe.style.cssText = 'width:100%;height:100%;border:none;display:block;position:absolute;inset:0;';
    body.appendChild(iframe);
    iframeCache[groupId] = iframe;
  }
}

function renderPlaceholder(grp) {
  document.getElementById('tbUrl').textContent = '— URL 미설정';
  const body = document.getElementById('frameBody');

  // 모든 캐시된 iframe 숨기기
  Object.values(iframeCache).forEach(f => f.style.display = 'none');

  // placeholder 이미 있으면 제거 후 재생성
  const existing = body.querySelector('.placeholder');
  if (existing) existing.remove();

  const chips = grp.items.map(i => `<span class="ph-chip">${i.icon} ${i.name}</span>`).join('');
  const ph = document.createElement('div');
  ph.className = 'placeholder';
  ph.innerHTML = `
    <div class="ph-emoji">${grp.icon}</div>
    <div class="ph-title">${grp.group}</div>
    <div class="ph-sub">GAS 배포 URL을 입력하면 이 창에서 바로 실행됩니다</div>
    <div class="ph-chips">${chips}</div>
    <div class="url-row">
      <input class="url-input" id="urlInput" type="url"
        placeholder="https://script.google.com/macros/s/...">
      <button class="url-submit" id="urlSubmit">저장 &amp; 열기</button>
    </div>
  `;
  body.appendChild(ph);

  const submit = () => {
    const val = document.getElementById('urlInput').value.trim();
    if (!val) return;
    saveUrl(activeGroupId, val);
    const dot = document.querySelector(`.tree-group-label[data-group="${activeGroupId}"] .url-dot`);
    if (dot) dot.style.opacity = '0.75';
    renderFrame(val, activeGroupId);
  };
  document.getElementById('urlSubmit').addEventListener('click', submit);
  document.getElementById('urlInput').addEventListener('keydown', e => { if(e.key==='Enter') submit(); });
}

function closeView() {
  activeGroupId = null;
  document.getElementById('frameView').classList.remove('visible');
  document.getElementById('welcome').style.display = 'flex';
  document.getElementById('breadcrumb').innerHTML = '<span>허브</span>';
  document.querySelectorAll('.tree-group-label').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tree-item').forEach(el => el.classList.remove('active'));
  // iframe들은 숨기기만 (캐시 유지)
  Object.values(iframeCache).forEach(f => f.style.display = 'none');
}
</script>
</body>
